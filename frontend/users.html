<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FoodTrace — Users</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { font-family:'DM Sans',sans-serif; } .brand { font-family:'DM Serif Display',serif; }
  .nav-link { display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:12px;font-size:.875rem;font-weight:500;transition:all .15s; }
  .nav-link.active { background:#1a2744;color:#fff; }
  .nav-link:not(.active) { color:#64748b; }
  .nav-link:not(.active):hover { background:#f1f5f9;color:#1a2744; }
</style>
</head>
<body class="h-full bg-slate-50">
<div class="flex h-screen overflow-hidden">
  <aside class="w-64 bg-white border-r border-stone-100 flex flex-col shrink-0">
    <div class="px-6 py-6 border-b border-stone-100"><div class="brand text-[#1a2744] text-2xl">FoodTrace</div><div class="text-xs text-slate-400 mt-0.5">Inventory & Waste Analytics</div></div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="dashboard.html"  class="nav-link">📊 Dashboard</a>
      <a href="inventory.html"  class="nav-link">📦 Inventory</a>
      <a href="waste-logs.html" class="nav-link">📋 Waste Logs</a>
      <a href="alerts.html"     class="nav-link">🔔 Alerts</a>
      <a href="users.html"      class="nav-link active">👥 Users</a>
    </nav>
    <div class="p-4 border-t border-stone-100">
      <div class="flex items-center gap-3 mb-3 px-2">
        <div class="w-8 h-8 rounded-full bg-[#1a2744] flex items-center justify-center text-white text-sm font-bold" id="avatar">?</div>
        <div><div class="text-sm font-semibold text-slate-700" id="nav-username">—</div><div class="text-xs text-slate-400" id="nav-role">—</div></div>
      </div>
      <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-rose-500 hover:bg-rose-50 rounded-xl transition">Sign Out</button>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <div class="p-8 max-w-5xl mx-auto">
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-800">User Management</h1>
        <p class="text-slate-400 text-sm mt-0.5">Manage system accounts and roles</p>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-stone-100 bg-slate-50">
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">ID</th>
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Username</th>
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Email</th>
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Role</th>
              <th class="text-right px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="users-table"><tr><td colspan="5" class="px-6 py-8 text-center text-slate-400">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
Auth.requireAuth();
Utils.renderNav();
const user = Auth.getUser();
if (user.role !== 'ADMIN') { Toast.error('Admin access only'); setTimeout(() => window.location.href='dashboard.html', 1200); }
document.getElementById('avatar').textContent = (user.username||'?')[0].toUpperCase();

const roleBadgeClass = { ADMIN:'bg-purple-100 text-purple-800', MANAGER:'bg-blue-100 text-blue-800', STAFF:'bg-slate-100 text-slate-600' };

async function loadUsers() {
    const res = await API.getUsers();
    if (res.ok && res.data.success) renderUsers(res.data.data);
    else Toast.error('Failed to load users');
}

function renderUsers(users) {
    const tbody = document.getElementById('users-table');
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-slate-400">No users found.</td></tr>'; return; }
    tbody.innerHTML = users.map(u => `
      <tr class="border-b border-stone-50 hover:bg-slate-50/50 transition">
        <td class="px-6 py-4 text-slate-400 text-xs">#${u.id}</td>
        <td class="px-6 py-4 font-medium text-slate-800">${u.username}</td>
        <td class="px-6 py-4 text-slate-500">${u.email || '—'}</td>
        <td class="px-6 py-4">
          <span class="inline-block px-2 py-0.5 rounded-full text-xs font-semibold ${roleBadgeClass[u.role]||''}">${u.role}</span>
        </td>
        <td class="px-6 py-4 text-right flex items-center justify-end gap-3">
          <select onchange="changeRole(${u.id}, this.value)" class="text-xs border border-stone-200 rounded-lg px-2 py-1 focus:outline-none bg-white">
            ${['STAFF','MANAGER','ADMIN'].map(r => `<option ${u.role===r?'selected':''}>${r}</option>`).join('')}
          </select>
          <button onclick="deleteUser(${u.id},'${u.username}')" class="text-rose-500 hover:underline font-medium text-sm">Delete</button>
        </td>
      </tr>`).join('');
}

async function changeRole(id, role) {
    const res = await API.updateUserRole(id, role);
    if (res.ok && res.data.success) Toast.success('Role updated');
    else Toast.error('Update failed');
}

async function deleteUser(id, name) {
    if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return;
    const res = await API.deleteUser(id);
    if (res.ok && res.data.success) { Toast.success('User deleted'); loadUsers(); }
    else Toast.error(res.data.message || 'Delete failed');
}

function logout() { Auth.clear(); window.location.href = 'index.html'; }
loadUsers();
</script>
</body>
</html>
