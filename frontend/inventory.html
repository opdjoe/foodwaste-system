<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FoodTrace — Inventory</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { font-family:'DM Sans',sans-serif; }
  .brand { font-family:'DM Serif Display',serif; }
  .nav-link { display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:12px;font-size:.875rem;font-weight:500;transition:all .15s; }
  .nav-link.active { background:#1a2744;color:#fff; }
  .nav-link:not(.active) { color:#64748b; }
  .nav-link:not(.active):hover { background:#f1f5f9;color:#1a2744; }
  .modal-bg { background:rgba(0,0,0,.45);backdrop-filter:blur(4px); }
  .badge-green { background:#d1fae5;color:#065f46; padding:2px 10px;border-radius:99px;font-size:.7rem;font-weight:600; }
  .badge-red   { background:#fee2e2;color:#991b1b; padding:2px 10px;border-radius:99px;font-size:.7rem;font-weight:600; }
  .badge-amber { background:#fef3c7;color:#92400e; padding:2px 10px;border-radius:99px;font-size:.7rem;font-weight:600; }
</style>
</head>
<body class="h-full bg-slate-50">
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-stone-100 flex flex-col shrink-0">
    <div class="px-6 py-6 border-b border-stone-100">
      <div class="brand text-[#1a2744] text-2xl">FoodTrace</div>
      <div class="text-xs text-slate-400 mt-0.5">Inventory & Waste Analytics</div>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="dashboard.html"  class="nav-link">📊 Dashboard</a>
      <a href="inventory.html"  class="nav-link active">📦 Inventory</a>
      <a href="waste-logs.html" class="nav-link">📋 Waste Logs</a>
      <a href="alerts.html"     class="nav-link">🔔 Alerts</a>
      <div id="admin-nav" class="hidden"><a href="users.html" class="nav-link">👥 Users</a></div>
    </nav>
    <div class="p-4 border-t border-stone-100">
      <div class="flex items-center gap-3 mb-3 px-2">
        <div class="w-8 h-8 rounded-full bg-[#1a2744] flex items-center justify-center text-white text-sm font-bold" id="avatar">?</div>
        <div>
          <div class="text-sm font-semibold text-slate-700" id="nav-username">—</div>
          <div class="text-xs text-slate-400" id="nav-role">—</div>
        </div>
      </div>
      <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-rose-500 hover:bg-rose-50 rounded-xl transition">Sign Out</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto">
    <div class="p-8 max-w-7xl mx-auto">

      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-slate-800">Inventory</h1>
          <p class="text-slate-400 text-sm mt-0.5">Current stock levels and item management</p>
        </div>
        <div class="flex gap-3">
          <button onclick="filterItems('all')" id="filter-all"
            class="px-4 py-2 rounded-xl text-sm font-medium bg-[#1a2744] text-white transition">All</button>
          <button onclick="filterItems('low')" id="filter-low"
            class="px-4 py-2 rounded-xl text-sm font-medium bg-white border border-stone-200 text-slate-600 hover:border-amber-400 transition">⚠ Low Stock</button>
          <button onclick="filterItems('expired')" id="filter-exp"
            class="px-4 py-2 rounded-xl text-sm font-medium bg-white border border-stone-200 text-slate-600 hover:border-rose-400 transition">🚫 Expired</button>
          <button id="btn-add" onclick="openAddModal()"
            class="px-4 py-2 rounded-xl text-sm font-medium bg-emerald-600 text-white hover:bg-emerald-700 transition">+ Add Item</button>
        </div>
      </div>

      <!-- Search -->
      <div class="mb-4">
        <input id="search-input" type="text" placeholder="Search items…" oninput="filterBySearch()"
          class="w-full max-w-xs px-4 py-2.5 border border-stone-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#1a2744]/30 bg-white"/>
      </div>

      <!-- Table -->
      <div class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-stone-100 bg-slate-50">
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Item</th>
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Unit</th>
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Qty</th>
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Threshold</th>
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Expiry</th>
              <th class="text-left px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
              <th class="text-right px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="inventory-table">
            <tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div id="item-modal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <h2 class="text-xl font-bold text-slate-800 mb-6" id="modal-title">Add Inventory Item</h2>
    <form id="item-form" onsubmit="handleItemSubmit(event)" class="space-y-4">
      <input type="hidden" id="item-id"/>
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Item Name</label>
        <input id="item-name" type="text" required placeholder="e.g. Chicken Breast"
          class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#1a2744]/30 transition"/>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Unit</label>
          <select id="item-unit" class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#1a2744]/30 transition">
            <option>kg</option><option>g</option><option>L</option><option>pieces</option><option>bags</option><option>boxes</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Quantity</label>
          <input id="item-qty" type="number" step="0.01" min="0" required placeholder="0.00"
            class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#1a2744]/30 transition"/>
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Expiry Date (optional)</label>
        <input id="item-expiry" type="date"
          class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#1a2744]/30 transition"/>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="Modal.close('item-modal')"
          class="flex-1 py-3 border border-stone-200 text-slate-600 rounded-xl font-medium hover:bg-slate-50 transition">Cancel</button>
        <button type="submit" id="modal-submit-btn"
          class="flex-1 py-3 bg-[#1a2744] text-white rounded-xl font-medium hover:bg-[#263561] transition">Save Item</button>
      </div>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
<script>
Auth.requireAuth();
Utils.renderNav();
const user = Auth.getUser();
if (user.role === 'ADMIN') document.getElementById('admin-nav').classList.remove('hidden');
document.getElementById('avatar').textContent = (user.username || '?')[0].toUpperCase();

const canWrite = ['MANAGER','ADMIN'].includes(user.role);
const canDelete = user.role === 'ADMIN';
if (!canWrite) document.getElementById('btn-add').classList.add('hidden');

let allItems = [];
let currentFilter = 'all';

async function loadInventory() {
    const res = await API.getInventory();
    if (res.ok && res.data.success) {
        allItems = res.data.data;
        renderTable(allItems);
    } else {
        Toast.error('Failed to load inventory');
    }
}

function filterItems(type) {
    currentFilter = type;
    ['all','low','expired'].forEach(f => {
        const btn = document.getElementById('filter-' + f);
        btn.className = btn.className.replace(/bg-\[#1a2744\] text-white/,'bg-white border border-stone-200 text-slate-600');
    });
    const activeBtn = document.getElementById('filter-' + type);
    activeBtn.className = activeBtn.className.replace('bg-white border border-stone-200 text-slate-600','bg-[#1a2744] text-white');

    let filtered = allItems;
    if (type === 'low')     filtered = allItems.filter(i => i.lowStock);
    if (type === 'expired') filtered = allItems.filter(i => i.expired);
    renderTable(filtered);
}

function filterBySearch() {
    const q = document.getElementById('search-input').value.toLowerCase();
    renderTable(allItems.filter(i => i.name.toLowerCase().includes(q)));
}

function renderTable(items) {
    const tbody = document.getElementById('inventory-table');
    if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">No items found.</td></tr>';
        return;
    }
    tbody.innerHTML = items.map(item => {
        let badge = '<span class="badge-green">OK</span>';
        if (item.expired)      badge = '<span class="badge-red">Expired</span>';
        else if (item.lowStock) badge = '<span class="badge-amber">Low Stock</span>';

        const actions = `
          ${canWrite ? `<button onclick='openEditModal(${JSON.stringify(item)})' class="text-[#1a2744] hover:underline mr-3 font-medium">Edit</button>` : ''}
          ${canDelete ? `<button onclick="deleteItem(${item.id})" class="text-rose-500 hover:underline font-medium">Delete</button>` : ''}
        `;

        return `<tr class="border-b border-stone-50 hover:bg-slate-50/50 transition">
          <td class="px-6 py-4 font-medium text-slate-800">${item.name}</td>
          <td class="px-6 py-4 text-slate-500">${item.unit}</td>
          <td class="px-6 py-4 font-semibold text-slate-700">${Number(item.currentQty).toFixed(2)}</td>
          <td class="px-6 py-4 text-slate-500">${item.minThreshold != null ? item.minThreshold : '—'}</td>
          <td class="px-6 py-4 text-slate-500">${Utils.formatDate(item.expiryDate)}</td>
          <td class="px-6 py-4">${badge}</td>
          <td class="px-6 py-4 text-right">${actions || '<span class="text-slate-300">—</span>'}</td>
        </tr>`;
    }).join('');
}

function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add Inventory Item';
    document.getElementById('item-id').value = '';
    document.getElementById('item-form').reset();
    Modal.open('item-modal');
}

function openEditModal(item) {
    document.getElementById('modal-title').textContent = 'Edit Item';
    document.getElementById('item-id').value = item.id;
    document.getElementById('item-name').value = item.name;
    document.getElementById('item-unit').value = item.unit;
    document.getElementById('item-qty').value = item.currentQty;
    document.getElementById('item-expiry').value = item.expiryDate || '';
    Modal.open('item-modal');
}

async function handleItemSubmit(e) {
    e.preventDefault();
    const id = document.getElementById('item-id').value;
    const dto = {
        name: document.getElementById('item-name').value.trim(),
        unit: document.getElementById('item-unit').value,
        currentQty: parseFloat(document.getElementById('item-qty').value),
        expiryDate: document.getElementById('item-expiry').value || null,
    };
    const res = id ? await API.updateInventory(id, dto) : await API.createInventory(dto);
    if (res.ok && res.data.success) {
        Toast.success(id ? 'Item updated!' : 'Item added!');
        Modal.close('item-modal');
        loadInventory();
    } else {
        Toast.error(res.data.message || 'Save failed');
    }
}

async function deleteItem(id) {
    if (!confirm('Delete this item? This cannot be undone.')) return;
    const res = await API.deleteInventory(id);
    if (res.ok && res.data.success) {
        Toast.success('Item deleted');
        loadInventory();
    } else {
        Toast.error(res.data.message || 'Delete failed');
    }
}

function logout() { Auth.clear(); window.location.href = 'index.html'; }
loadInventory();
</script>
</body>
</html>
