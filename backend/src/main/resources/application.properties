# =============================================================
# Food Waste & Inventory Analytics System
# Application Configuration
# =============================================================

spring.application.name=foodwaste-api
server.port=8080

# ── MySQL Database ────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/foodwaste_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=opoku
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP) ────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=c2VjcmV0S2V5Rm9yRm9vZFdhc3RlU3lzdGVtMjAyNlN1cGVyU2VjdXJlS2V5MTIz
app.jwt.expiration-ms=86400000

# ── Logging ───────────────────────────────────────────────────
logging.level.com.foodwaste=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── CORS ─────────────────────────────────────────────────────
# Covers: file:// opened pages, Live Server, Python http.server, Node serve
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:3000,http://127.0.0.1:8080

# NOTE: spring.main.allow-circular-references=true has been REMOVED.
# The circular dependency is now properly resolved by injecting
# UserDetailsServiceImpl directly in JwtAuthFilter instead of the interface.
